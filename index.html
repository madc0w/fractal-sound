<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FractalSound</title>
		<style>
			:root {
				font-family:
					Segoe UI,
					Tahoma,
					Geneva,
					Verdana,
					sans-serif;
				line-height: 1.5;
				font-weight: 400;
				color: #1d1d1d;
				background: linear-gradient(160deg, #f7f5ef 0%, #e6f0ff 100%);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
			}

			#app {
				min-height: 100vh;
				display: grid;
				align-items: start;
				justify-items: center;
				padding: 24px;
			}

			.app-shell {
				text-align: left;
				background: rgba(255, 255, 255, 0.88);
				border: 1px solid rgba(0, 0, 0, 0.08);
				border-radius: 16px;
				padding: 32px;
				max-width: 520px;
				width: 100%;
			}

			h1 {
				margin: 0 0 12px;
				font-size: clamp(2rem, 3vw, 2.8rem);
				text-align: center;
			}

			p {
				margin: 0;
				color: #444;
				text-align: center;
			}

			.controls {
				margin-top: 18px;
				display: grid;
				gap: 12px;
			}

			.tab-row {
				display: flex;
				gap: 2px;
				align-items: flex-end;
				border-bottom: 1px solid rgba(21, 71, 128, 0.22);
				padding-bottom: 0;
			}

			.tab {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-width: 112px;
				padding: 10px 16px;
				border: 1px solid rgba(21, 71, 128, 0.22);
				border-bottom: none;
				border-top-left-radius: 12px;
				border-top-right-radius: 12px;
				background: linear-gradient(180deg, #f3f7fc 0%, #e4edf8 100%);
				color: #21466f;
				font: inherit;
				font-weight: 600;
				cursor: pointer;
				user-select: none;
				transform: translateY(1px);
				transition:
					background 120ms ease,
					color 120ms ease,
					border-color 120ms ease;
			}

			.tab.active {
				background: rgba(255, 255, 255, 0.92);
				color: #0d2a4d;
				border-color: #154780;
				position: relative;
				z-index: 1;
			}

			.tab:not(.active):hover {
				background: linear-gradient(180deg, #ffffff 0%, #e8f1fb 100%);
			}

			.field {
				display: grid;
				gap: 6px;
				text-align: left;
			}

			.zoom-row {
				display: flex;
				align-items: center;
				justify-content: flex-start;
				gap: 10px;
			}

			.field label {
				font-size: 0.95rem;
				font-weight: 600;
			}

			.field input:not(.zoom-input) {
				width: 100%;
				padding: 8px 10px;
				border-radius: 8px;
				border: 1px solid rgba(0, 0, 0, 0.2);
				font: inherit;
			}

			.field select {
				width: 100%;
				padding: 8px 10px;
				border-radius: 8px;
				border: 1px solid rgba(0, 0, 0, 0.2);
				font: inherit;
				background: #fff;
			}

			.zoom-input {
				display: inline-block;
				width: 6ch;
				min-width: 6ch;
				text-align: center;
				padding: 8px 6px;
				border-radius: 8px;
				border: 1px solid rgba(0, 0, 0, 0.2);
				font: inherit;
			}

			input[type='number'] {
				-moz-appearance: textfield;
			}

			input[type='number']::-webkit-outer-spin-button,
			input[type='number']::-webkit-inner-spin-button {
				-webkit-appearance: none;
				margin: 0;
			}

			.file-input {
				display: none;
			}

			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 112px;
				padding: 9px 14px;
				border: 1px solid #154780;
				border-radius: 10px;
				background: linear-gradient(180deg, #ffffff 0%, #dcecff 100%);
				color: #0d2a4d;
				font-weight: 600;
				font: inherit;
				text-decoration: none;
				cursor: pointer;
				transition:
					transform 120ms ease,
					box-shadow 120ms ease;
			}

			.btn:hover {
				transform: translateY(-1px);
				box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
			}

			.file-row {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				flex-wrap: wrap;
			}

			.midi-file-row {
				gap: 8px;
			}

			.midi-file-row .btn {
				width: 100px;
				white-space: nowrap;
			}

			.action-row {
				display: flex;
				align-items: flex-start;
				gap: 10px;
			}

			.btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				transform: none;
				box-shadow: none;
			}

			.iteration {
				margin: 2px 0 0;
				font-size: 0.95rem;
				font-weight: 600;
				color: #17385f;
				text-align: left;
			}

			.file-name {
				font-size: 0.95rem;
				color: #2a2a2a;
			}

			.status-text {
				margin-top: 4px;
				font-size: 0.92rem;
				color: #355a82;
				text-align: left;
			}

			.metric {
				font-size: 0.92rem;
				font-weight: 600;
				color: #21466f;
				text-align: left;
			}

			.progress-block {
				display: grid;
				gap: 6px;
			}

			.progress-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
			}

			.progress-label,
			.progress-value,
			.time-readout {
				font-size: 0.9rem;
				color: #355a82;
				text-align: left;
			}

			.progress-value,
			.time-readout {
				font-variant-numeric: tabular-nums;
			}

			progress {
				width: 100%;
				height: 10px;
				accent-color: #154780;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>

		<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
		<script src="https://unpkg.com/@tonejs/midi@2.0.28/build/Midi.js"></script>
		<script>
			const { createApp } = Vue;
			const AudioContextClass =
				window.AudioContext || window.webkitAudioContext;
			const MIDI_ROOT_NOTE = 60;
			const MIDI_SAMPLE_BASE_URL =
				'https://madc0w.github.io/fractal-sound/samples/';
			const MIDI_SAMPLE_FILES = [
				'banjo.wav',
				'bass-clarinet.wav',
				'bassoon.wav',
				'cello.wav',
				'clarinet.wav',
				'contrabassoon.wav',
				'double-bass.wav',
				'english-horn.wav',
				'flute.wav',
				'french-horn.wav',
				'guitar.wav',
				'mandolin.wav',
				'oboe.wav',
				'saxophone.wav',
				'trombone.wav',
				'trumpet.wav',
				'tuba.wav',
				'viola.wav',
				'violin.wav',
			];

			function humanizeSampleName(fileName) {
				return fileName
					.replace(/\.wav$/i, '')
					.split('-')
					.map((part) => part.charAt(0).toUpperCase() + part.slice(1))
					.join(' ');
			}

			function cloneNote(note) {
				return {
					midi: note.midi,
					time: note.time,
					duration: note.duration,
					velocity: note.velocity,
				};
			}

			function cloneNotes(notes) {
				return notes.map(cloneNote);
			}
			const FRACTAL_RENDERER_SOURCE = `
				const state = {
					zoomFactor: 0.8,
					originalChannels: [],
					currentIteration: 0,
					currentChannels: [],
					highestRequestedIteration: 0,
					isRendering: false,
				};

				function clampZoomFactor(value) {
					const numericValue = Number(value);

					if (!Number.isFinite(numericValue)) {
						return 0.8;
					}

					return Math.min(1, Math.max(0.1, numericValue));
				}

				function cloneChannels(channels) {
					return channels.map((channel) => channel.slice());
				}

				function stretchCenterSegment(channel, zoomFactor) {
					const length = channel.length;

					if (length <= 1) {
						return channel.slice();
					}

					const segmentLength = Math.max(2, Math.min(length, length * zoomFactor));
					const segmentStart = (length - segmentLength) / 2;
					const denominator = length - 1;
					const stretched = new Float32Array(length);

					for (let index = 0; index < length; index += 1) {
						const sourcePosition =
							segmentStart + (index / denominator) * (segmentLength - 1);
						const lowerIndex = Math.floor(sourcePosition);
						const upperIndex = Math.min(length - 1, lowerIndex + 1);
						const fraction = sourcePosition - lowerIndex;
						const lowerSample = channel[lowerIndex] ?? 0;
						const upperSample = channel[upperIndex] ?? lowerSample;

						stretched[index] =
							lowerSample + (upperSample - lowerSample) * fraction;
					}

					return stretched;
				}

				function buildNextIteration(previousChannels, originalChannels, zoomFactor) {
					const originalMix = 1 - zoomFactor;
					let peakAmplitude = 0;

					const mixedChannels = previousChannels.map((previousChannel, channelIndex) => {
						const originalChannel = originalChannels[channelIndex];
						const zoomedChannel = stretchCenterSegment(previousChannel, zoomFactor);
						const mixedChannel = new Float32Array(zoomedChannel.length);

						for (let index = 0; index < zoomedChannel.length; index += 1) {
							const mixedSample =
								zoomedChannel[index] + originalChannel[index] * originalMix;
							mixedChannel[index] = mixedSample;
							peakAmplitude = Math.max(peakAmplitude, Math.abs(mixedSample));
						}

						return mixedChannel;
					});

					if (peakAmplitude <= 1) {
						return mixedChannels;
					}

					const normalizationFactor = 1 / peakAmplitude;
					mixedChannels.forEach((channel) => {
						for (let index = 0; index < channel.length; index += 1) {
							channel[index] *= normalizationFactor;
						}
					});

					return mixedChannels;
				}

				function renderPendingIterations() {
					if (state.isRendering) {
						return;
					}

					state.isRendering = true;

					while (state.currentIteration < state.highestRequestedIteration) {
						state.currentChannels = buildNextIteration(
							state.currentChannels,
							state.originalChannels,
							state.zoomFactor,
						);
						state.currentIteration += 1;
						const payloadChannels = cloneChannels(state.currentChannels);

						postMessage(
							{
								type: 'iteration-ready',
								iteration: state.currentIteration,
								channels: payloadChannels,
							},
							payloadChannels.map((channel) => channel.buffer),
						);
					}

					state.isRendering = false;
				}

				onmessage = ({ data }) => {
					switch (data.type) {
						case 'setup':
							state.zoomFactor = clampZoomFactor(data.zoomFactor);
							state.originalChannels = data.originalChannels.map(
								(channel) => new Float32Array(channel),
							);
							state.currentChannels = cloneChannels(state.originalChannels);
							state.currentIteration = 0;
							state.highestRequestedIteration = 0;
							break;
						case 'render-through':
							state.highestRequestedIteration = Math.max(
								state.highestRequestedIteration,
								data.iteration,
							);
							renderPendingIterations();
							break;
					}
				};
			`;

			createApp({
				data() {
					return {
						appName: 'FractalSound',
						message:
							'Choose an audio file. Each pass zooms into the middle, stretches it back to full length, and mixes in part of the original wave.',
						activeTab: 'wav',
						wavFileName: '',
						midiFileName: '',
						midiInstrumentOptions: MIDI_SAMPLE_FILES.map((fileName) => ({
							fileName,
							label: humanizeSampleName(fileName),
						})),
						selectedMidiInstrument: 'violin.wav',
						midiLoopIteration: 0,
						midiPlaybackReady: false,
						midiIsPlaying: false,
						midiCumulativeZoom: 1,
						midiSplitCount: 0,
						midiLastSplitZoom: null,
						midiLastSplitFromNotes: 0,
						midiLastSplitToNotes: 0,
						midiSecondsPerQuarter: 0.5,
						midiOriginalNotes: [],
						midiBasisNotes: [],
						midiOriginalRenderedBuffer: null,
						midiSampleBuffers: new Map(),
						midiInstrumentBuffer: null,
						midiInstrumentBufferName: '',
						midiCurrentSource: null,
						midiOriginalSource: null,
						midiIsPlayingOriginal: false,
						midiOriginalStartTime: 0,
						midiCurrentIterationStartTime: 0,
						midiPausedOffset: 0,
						midiPlaybackToken: 0,
						midiNextSplitZoom: 2,
						midiCurrentPlaybackBuffer: null,
						midiPlaybackTimeSeconds: 0,
						midiPlaybackDurationSeconds: 0,
						midiOperationLabel: '',
						midiOperationCurrent: null,
						midiOperationTotal: null,
						zoomFactor: 0.8,
						loopIteration: 0,
						isPlaying: false,
						statusText: 'Choose an audio file to build the fractal waveform.',
						midiStatusText:
							'Choose a MIDI file to prepare MIDI-specific processing.',
						preparedThroughIteration: 0,
						playbackReady: false,
						audioContext: null,
						originalBuffer: null,
						renderedIterationBuffers: new Map(),
						iterationResolvers: new Map(),
						renderWorker: null,
						renderWorkerUrl: '',
						currentSource: null,
						currentIterationStartTime: 0,
						pausedOffset: 0,
						playbackToken: 0,
						currentPlaybackBuffer: null,
						playbackTimeSeconds: 0,
						playbackDurationSeconds: 0,
						wavOperationLabel: '',
						wavOperationCurrent: null,
						wavOperationTotal: null,
						wavRequestedThroughIteration: 0,
						uiTickerId: null,
						prefetchDepth: 4,
						maxBufferedIterations: 6,
					};
				},
				mounted() {
					this.startUiTicker();
				},
				beforeUnmount() {
					this.stopUiTicker();
					this.destroyRenderWorker();
					this.stopPlayback(true);
					this.stopMidiPlayback(true);
					this.stopMidiOriginalPlayback();
				},
				methods: {
					clampZoomFactor(value) {
						const numericValue = Number(value);

						if (!Number.isFinite(numericValue)) {
							return 0.8;
						}

						return Math.min(1, Math.max(0.1, numericValue));
					},
					setActiveTab(tab) {
						this.activeTab = tab;
					},
					formatTime(seconds) {
						const safeSeconds = Math.max(
							0,
							Number.isFinite(seconds) ? seconds : 0,
						);
						const minutes = Math.floor(safeSeconds / 60);
						const remainingSeconds = Math.floor(safeSeconds % 60);
						return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
					},
					setWavOperation(label, current = null, total = null) {
						this.wavOperationLabel = label;
						this.wavOperationCurrent = current;
						this.wavOperationTotal = total;
					},
					clearWavOperation() {
						this.wavOperationLabel = '';
						this.wavOperationCurrent = null;
						this.wavOperationTotal = null;
					},
					setMidiOperation(label, current = null, total = null) {
						this.midiOperationLabel = label;
						this.midiOperationCurrent = current;
						this.midiOperationTotal = total;
					},
					clearMidiOperation() {
						this.midiOperationLabel = '';
						this.midiOperationCurrent = null;
						this.midiOperationTotal = null;
					},
					startUiTicker() {
						this.stopUiTicker();
						this.uiTickerId = window.setInterval(() => {
							this.updatePlaybackTimes();
						}, 100);
					},
					stopUiTicker() {
						if (this.uiTickerId) {
							window.clearInterval(this.uiTickerId);
							this.uiTickerId = null;
						}
					},
					updatePlaybackTimes() {
						if (this.currentPlaybackBuffer) {
							const elapsed =
								this.isPlaying && this.audioContext
									? this.audioContext.currentTime -
										this.currentIterationStartTime
									: this.pausedOffset;
							this.playbackDurationSeconds =
								this.currentPlaybackBuffer.duration;
							this.playbackTimeSeconds = Math.max(
								0,
								Math.min(this.currentPlaybackBuffer.duration, elapsed),
							);
						} else {
							this.playbackDurationSeconds = 0;
							this.playbackTimeSeconds = 0;
						}

						if (this.midiCurrentPlaybackBuffer) {
							let elapsed = this.midiPausedOffset;
							if (this.audioContext) {
								if (this.midiIsPlayingOriginal) {
									elapsed =
										this.audioContext.currentTime - this.midiOriginalStartTime;
								} else if (this.midiIsPlaying) {
									elapsed =
										this.audioContext.currentTime -
										this.midiCurrentIterationStartTime;
								}
							}
							this.midiPlaybackDurationSeconds =
								this.midiCurrentPlaybackBuffer.duration;
							this.midiPlaybackTimeSeconds = Math.max(
								0,
								Math.min(this.midiCurrentPlaybackBuffer.duration, elapsed),
							);
						} else {
							this.midiPlaybackDurationSeconds = 0;
							this.midiPlaybackTimeSeconds = 0;
						}
					},
					formatZoomValue(value) {
						if (!Number.isFinite(value)) {
							return '1.00x';
						}

						if (value >= 100) {
							return `${value.toFixed(0)}x`;
						}

						if (value >= 10) {
							return `${value.toFixed(1)}x`;
						}

						return `${value.toFixed(2)}x`;
					},
					getCumulativeZoom(iteration) {
						return Math.pow(
							1 / this.clampZoomFactor(this.zoomFactor),
							iteration,
						);
					},
					isWavFile(file) {
						if (!file) {
							return false;
						}

						const fileName = (file.name || '').toLowerCase();
						const fileType = (file.type || '').toLowerCase();

						return (
							fileName.endsWith('.wav') ||
							fileType === 'audio/wav' ||
							fileType === 'audio/x-wav' ||
							fileType === 'audio/wave' ||
							fileType === 'audio/vnd.wave'
						);
					},
					isMidiFile(file) {
						if (!file) {
							return false;
						}

						const fileName = (file.name || '').toLowerCase();
						const fileType = (file.type || '').toLowerCase();

						return (
							fileName.endsWith('.mid') ||
							fileName.endsWith('.midi') ||
							fileType === 'audio/midi' ||
							fileType === 'audio/x-midi' ||
							fileType === 'application/x-midi' ||
							fileType === 'application/vnd.midi'
						);
					},
					getSampleUrl(fileName) {
						return new URL(fileName, MIDI_SAMPLE_BASE_URL).href;
					},
					async ensureAudioContext() {
						if (!AudioContextClass) {
							throw new Error('Web Audio is not available in this browser.');
						}

						if (!this.audioContext) {
							this.audioContext = new AudioContextClass();
						}

						if (this.audioContext.state === 'suspended') {
							await this.audioContext.resume();
						}
					},
					createRenderWorker() {
						this.destroyRenderWorker();

						this.renderWorkerUrl = URL.createObjectURL(
							new Blob([FRACTAL_RENDERER_SOURCE], {
								type: 'application/javascript',
							}),
						);
						this.renderWorker = new Worker(this.renderWorkerUrl);
						this.renderWorker.addEventListener(
							'message',
							this.handleWorkerMessage,
						);
					},
					destroyRenderWorker() {
						if (this.renderWorker) {
							this.renderWorker.removeEventListener(
								'message',
								this.handleWorkerMessage,
							);
							this.renderWorker.terminate();
							this.renderWorker = null;
						}

						if (this.renderWorkerUrl) {
							URL.revokeObjectURL(this.renderWorkerUrl);
							this.renderWorkerUrl = '';
						}
					},
					handleWorkerMessage(event) {
						const { data } = event;

						if (data.type !== 'iteration-ready') {
							return;
						}

						const audioBuffer = this.createAudioBufferFromChannels(
							data.channels,
						);
						this.renderedIterationBuffers.set(data.iteration, audioBuffer);
						this.preparedThroughIteration = Math.max(
							this.preparedThroughIteration,
							data.iteration,
						);
						if (this.wavRequestedThroughIteration > this.loopIteration) {
							const current = Math.max(
								0,
								this.preparedThroughIteration - this.loopIteration,
							);
							const total = Math.max(
								1,
								this.wavRequestedThroughIteration - this.loopIteration,
							);

							if (current >= total) {
								this.clearWavOperation();
							} else {
								this.setWavOperation(
									'Precomputing upcoming passes',
									current,
									total,
								);
							}
						}

						const pendingResolver = this.iterationResolvers.get(data.iteration);
						if (pendingResolver) {
							pendingResolver.resolve(audioBuffer);
							this.iterationResolvers.delete(data.iteration);
						}

						this.pruneBufferedIterations();
					},
					createAudioBufferFromChannels(channels) {
						const sampleRate =
							this.originalBuffer?.sampleRate || this.audioContext.sampleRate;
						const firstChannel = channels[0];
						const frameCount = firstChannel.length;
						const audioBuffer = this.audioContext.createBuffer(
							channels.length,
							frameCount,
							sampleRate,
						);

						channels.forEach((channel, channelIndex) => {
							audioBuffer.copyToChannel(
								new Float32Array(channel),
								channelIndex,
							);
						});

						return audioBuffer;
					},
					primeOriginalIteration() {
						this.renderedIterationBuffers = this.originalBuffer
							? new Map([[0, this.originalBuffer]])
							: new Map();
						this.iterationResolvers = new Map();
						this.preparedThroughIteration = 0;
						this.currentPlaybackBuffer = this.originalBuffer;
						this.playbackDurationSeconds = this.originalBuffer?.duration || 0;
						this.playbackTimeSeconds = 0;
					},
					primeMidiIterations() {
						this.midiSampleBuffers = this.midiOriginalRenderedBuffer
							? new Map([[0, this.midiOriginalRenderedBuffer]])
							: new Map();
						this.midiBasisNotes = cloneNotes(this.midiOriginalNotes);
						this.midiLoopIteration = 0;
						this.midiPausedOffset = 0;
						this.midiCurrentSource = null;
						this.midiOriginalSource = null;

							2,
							Math.min(length, length * zoomFactor),
						);
						const segmentStart = (length - segmentLength) / 2;
						const denominator = length - 1;
						const stretched = new Float32Array(length);

						for (let index = 0; index < length; index += 1) {
							const sourcePosition =
								segmentStart + (index / denominator) * (segmentLength - 1);
							const lowerIndex = Math.floor(sourcePosition);
							const upperIndex = Math.min(length - 1, lowerIndex + 1);
							const fraction = sourcePosition - lowerIndex;
							const lowerSample = channel[lowerIndex] ?? 0;

						}

						const shouldResume = this.isPlaying;
						this.stopPlayback(true);
						this.loopIteration = 0;
						this.pausedOffset = 0;
						this.statusText = 'Reset to the original waveform.';
						this.clearWavOperation();
						this.requestPrecomputation(1);

						if (shouldResume) {
							await this.playCurrentIteration();
						}
					},
					async handleAudioSelect(event) {
						const [file] = event.target.files || [];

						if (!file) {
							return;
						}

						if (!this.isWavFile(file)) {
							this.wavFileName = '';
							this.playbackReady = false;
							this.originalBuffer = null;
							this.primeOriginalIteration();
							this.statusText = 'Only WAV files are allowed in the WAV tab.';
							event.target.value = '';
							return;
						}

						this.wavFileName = file.name;
						this.stopPlayback(true);
						this.statusText =
							'Decoding audio and building the first fractal pass...';
						this.setWavOperation('Decoding WAV');

						try {
							await this.ensureAudioContext();
							const fileBytes = await file.arrayBuffer();
							const decodedBuffer = await this.audioContext.decodeAudioData(
								fileBytes.slice(0),
							);

							this.originalBuffer = decodedBuffer;
							this.primeOriginalIteration();
							this.configureRenderWorker();
							this.loopIteration = 0;
							this.pausedOffset = 0;
							this.playbackReady = true;
							this.statusText =
								'Loaded the original waveform. Precomputing upcoming passes in the background.';
							this.clearWavOperation();
							this.requestPrecomputation(1);
							await this.playCurrentIteration();
						} catch (error) {
							this.playbackReady = false;
							this.originalBuffer = null;
							this.primeOriginalIteration();
							this.clearWavOperation();
							this.statusText =
								error.message || 'Unable to decode this audio file.';
						}

						this.loopIteration = 0;
						this.pausedOffset = 0;
					},
					async handleMidiSelect(event) {
						const [file] = event.target.files || [];

						if (!file) {
							return;
						}

						if (!this.isMidiFile(file)) {
							this.midiFileName = '';
							this.midiPlaybackReady = false;
							this.midiLoopIteration = 0;
							this.midiIsPlaying = false;
							this.midiOriginalNotes = [];
							this.midiBasisNotes = [];
							this.midiOriginalRenderedBuffer = null;
							this.midiSampleBuffers = new Map();
							this.midiCumulativeZoom = 1;
							this.midiStatusText =
								'Only MIDI files are allowed in the MIDI tab.';
							event.target.value = '';
							return;
						}

						this.midiFileName = file.name;
						this.stopMidiPlayback(true);
						this.midiStatusText =
							'Parsing MIDI and rendering the original instrument...';
						this.setMidiOperation('Parsing MIDI');

						try {
							await this.ensureAudioContext();
							if (typeof Midi !== 'function') {
								throw new Error('The MIDI parser library is unavailable.');
							}

							const midiBytes = await file.arrayBuffer();
							const midi = new Midi(midiBytes);
							const parsedNotes = this.flattenMidiNotes(midi);

							if (!parsedNotes.length) {
								throw new Error(
									'No playable notes were found in this MIDI file.',
								);
							}

							const bpm = midi.header.tempos[0]?.bpm || 120;
							this.midiSecondsPerQuarter = 60 / bpm;
							this.midiOriginalNotes = cloneNotes(parsedNotes);
							this.midiBasisNotes = cloneNotes(parsedNotes);
							this.midiLoopIteration = 0;
							this.midiPausedOffset = 0;
							this.midiCumulativeZoom = 1;
							await this.prepareMidiOriginalRender();
							this.midiPlaybackReady = true;
							this.midiStatusText =
								'Original MIDI rendered. C4 now maps to the full original sound compressed to a quarter note.';
							this.clearMidiOperation();
							await this.playCurrentMidiIteration();
						} catch (error) {
							this.midiPlaybackReady = false;
							this.midiOriginalNotes = [];
							this.midiBasisNotes = [];
							this.midiOriginalRenderedBuffer = null;
							this.stopMidiOriginalPlayback();
							this.midiSampleBuffers = new Map();
							this.clearMidiOperation();
							this.midiStatusText =
								error.message || 'Unable to process this MIDI file.';
						}
					},
				},
				template: `
					<main class="app-shell">
						<h1>{{ appName }}</h1>
						<p>{{ message }}</p>
						<div class="controls">
							<div class="tab-row">
								<div
									role="tab"
									tabindex="0"
									class="tab"
									:class="{ active: activeTab === 'wav' }"
									@click="setActiveTab('wav')"
									@keydown.enter="setActiveTab('wav')"
									@keydown.space.prevent="setActiveTab('wav')"
								>
									WAV
								</div>
								<div
									role="tab"
									tabindex="0"
									class="tab"
									:class="{ active: activeTab === 'midi' }"
									@click="setActiveTab('midi')"
									@keydown.enter="setActiveTab('midi')"
									@keydown.space.prevent="setActiveTab('midi')"
								>
									MIDI
								</div>
							</div>
							<template v-if="activeTab === 'wav'">
							<div class="field">
								<div class="zoom-row">
									<label for="zoom-factor">Zoom factor per loop (0.1 to 1)</label>
									<input
										class="zoom-input"
										id="zoom-factor"
										type="number"
										min="0.1"
										max="1"
										step="0.01"
										v-model.number="zoomFactor"
										@change="handleZoomFactorChange"
									/>
								</div>
							</div>
							<div class="file-row">
								<label class="btn" for="audio-file">Choose file</label>
								<input
									id="audio-file"
									class="file-input"
									type="file"
									accept=".wav,audio/wav,audio/x-wav,audio/wave,audio/vnd.wave"
									@change="handleAudioSelect"
								/>
								<button
									type="button"
									class="btn"
									@click="togglePlayback"
									:disabled="!playbackReady"
								>
									{{ isPlaying ? 'Pause' : 'Play' }}
								</button>
								<button
									type="button"
									class="btn"
									@click="resetPlayback"
									:disabled="!playbackReady"
								>
									Reset
								</button>
							</div>
							<p v-if="wavFileName" class="file-name">Selected: {{ wavFileName }}</p>
							<div v-if="playbackReady || wavOperationLabel" class="progress-block">
								<div class="progress-row">
									<span class="progress-label">{{ wavOperationLabel || 'Playback ready' }}</span>
									<span v-if="wavOperationTotal" class="progress-value">
										{{ Math.min(wavOperationCurrent || 0, wavOperationTotal) }}/{{ wavOperationTotal }}
									</span>
								</div>
								<progress
									v-if="wavOperationLabel"
									:max="wavOperationTotal || 1"
									:value="wavOperationTotal ? Math.min(wavOperationCurrent || 0, wavOperationTotal) : null"
								></progress>
							</div>
							<p v-if="playbackReady || currentPlaybackBuffer" class="metric time-readout">
								Playback: {{ formatTime(playbackTimeSeconds) }} / {{ formatTime(playbackDurationSeconds) }}
							</p>
							<p v-if="playbackReady" class="iteration">
								Iteration: {{ loopIteration + 1 }}
							</p>
							<p v-if="playbackReady" class="status-text">
								Prepared through iteration {{ preparedThroughIteration + 1 }}. {{ statusText }}
							</p>
							<p v-else class="status-text">{{ statusText }}</p>
							</template>
							<template v-else>
								<div class="field">
									<label for="midi-instrument">Original MIDI instrument</label>
									<select
										id="midi-instrument"
										v-model="selectedMidiInstrument"
										@change="handleMidiInstrumentChange"
									>
										<option
											v-for="instrument in midiInstrumentOptions"
											:key="instrument.fileName"
											:value="instrument.fileName"
										>
											{{ instrument.label }}
										</option>
									</select>
								</div>
								<div class="field">
									<div class="zoom-row">
										<label for="midi-zoom-factor">Zoom factor per loop (0.1 to 1)</label>
										<input
											class="zoom-input"
											id="midi-zoom-factor"
											type="number"
											min="0.1"
											max="1"
											step="0.01"
											v-model.number="zoomFactor"
											@change="handleMidiZoomFactorChange"
										/>
									</div>
								</div>
								<div class="file-row midi-file-row">
									<label class="btn" for="midi-file">Choose file</label>
									<input
										id="midi-file"
										class="file-input"
										type="file"
										accept=".mid,.midi,audio/midi,audio/x-midi,application/x-midi,application/vnd.midi"
										@change="handleMidiSelect"
									/>
									<button
										type="button"
										class="btn"
										@click="playOriginalMidi"
										:disabled="!midiOriginalRenderedBuffer"
									>
										Play original
									</button>
									<button
										type="button"
										class="btn"
										@click="toggleMidiPlayback"
										:disabled="!midiPlaybackReady"
									>
										{{ midiIsPlaying ? 'Pause' : 'Play' }}
									</button>
									<button
										type="button"
										class="btn"
										@click="resetMidiPlayback"
										:disabled="!midiPlaybackReady"
									>
										Reset
									</button>
								</div>
								<p v-if="midiFileName" class="file-name">Selected: {{ midiFileName }}</p>
								<div v-if="midiPlaybackReady || midiOperationLabel" class="progress-block">
									<div class="progress-row">
										<span class="progress-label">{{ midiOperationLabel || 'Playback ready' }}</span>
									</div>
									<progress v-if="midiOperationLabel"></progress>
								</div>
								<p class="metric">Cumulative zoom: {{ formatZoomValue(midiCumulativeZoom) }}</p>
								<p class="metric">
									Next note split at: {{ formatZoomValue(midiNextSplitZoom) }}
								</p>
								<p v-if="midiLastSplitZoom" class="metric">
									Last split at {{ formatZoomValue(midiLastSplitZoom) }}: {{ midiLastSplitFromNotes }} -> {{ midiLastSplitToNotes }} notes
								</p>
								<p v-if="midiPlaybackReady || midiCurrentPlaybackBuffer" class="metric time-readout">
									Playback: {{ formatTime(midiPlaybackTimeSeconds) }} / {{ formatTime(midiPlaybackDurationSeconds) }}
								</p>
								<p v-if="midiPlaybackReady" class="iteration">
									Iteration: {{ midiLoopIteration + 1 }}
								</p>
								<p class="status-text">{{ midiStatusText }}</p>
							</template>
						</div>
					</main>
				`,
			}).mount('#app');
		</script>
	</body>
</html>
